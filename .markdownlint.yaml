---
# Default state for all rules
default: true
# Path to configuration file to extend
extends: null
# MD003/heading-style
MD003:
  style: "consistent"
# MD004/ul-style
MD004:
  style: "consistent"
# MD007/ul-indent
MD007:
  indent: 2
  start_indented: false
  start_indent: 2
# MD009/no-trailing-spaces
MD009:
  br_spaces: 2
  list_item_empty_lines: false
  strict: false
# MD010/no-hard-tabs
MD010:
  code_blocks: true
  ignore_code_languages: []
  spaces_per_tab: 1
# MD012/no-multiple-blanks
MD012:
  maximum: 1
# MD013/line-length
MD013:
  line_length: 80
  heading_line_length: 80
  code_block_line_length: 80
  code_blocks: true
  # Disabled for terraform-docs generated tables
  tables: false
  headings: true
  strict: false
  stern: false
# MD024/no-duplicate-heading
MD024:
  siblings_only: false
# MD025/single-title/single-h1
MD025:
  level: 1
  front_matter_title: "^\\s*title\\s*[:=]"
# MD029/ol-prefix
MD029:
  style: "one_or_ordered"
# MD033/no-inline-html (terraform-docs generates these)
MD033:
  allowed_elements:
    - a
    - br
    - pre
    - img
# MD041/first-line-heading - disabled: README starts with a logo image
MD041: false
# MD045/no-alt-text - disabled: logo uses inline HTML img tag
MD045: false
# MD059/descriptive-link-text - disabled for template docs
MD059: false
# MD060/table-column-style - disabled for terraform-docs compatibility
MD060: false
